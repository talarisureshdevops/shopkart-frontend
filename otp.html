

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Nexus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #e0e7ff;
            --secondary: #0f172a;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --radius: 12px;
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gray-100);
            color: var(--gray-800);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(79, 70, 229, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--gray-200);
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .auth-logo .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .auth-logo span {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header .icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .auth-header .icon-circle svg {
            width: 28px;
            height: 28px;
            color: var(--primary);
        }

        .auth-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .auth-header p {
            font-size: 14px;
            color: var(--gray-500);
            line-height: 1.6;
        }

        .auth-header .email-sent {
            font-weight: 600;
            color: var(--gray-700);
        }

        /* OTP Input */
        .otp-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .otp-input {
            width: 52px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            background: var(--gray-50);
            color: var(--gray-900);
            outline: none;
            transition: all 0.2s;
            caret-color: var(--primary);
        }

        .otp-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
            background: white;
            transform: translateY(-2px);
        }

        .otp-input.filled {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .otp-input.error {
            border-color: var(--danger);
            background: #fef2f2;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Timer */
        .timer-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .timer-text {
            font-size: 13px;
            color: var(--gray-500);
        }

        .timer-text .time {
            font-weight: 700;
            color: var(--primary);
        }

        .timer-text .time.expired {
            color: var(--danger);
        }

        .resend-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
            display: none;
        }

        .resend-btn:hover {
            background: var(--primary-light);
        }

        .resend-btn.visible {
            display: inline;
        }

        .btn-primary {
            width: 100%;
            padding: 13px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-primary svg {
            width: 18px;
            height: 18px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-100);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: var(--primary-dark);
        }

        .auth-footer a svg {
            width: 16px;
            height: 16px;
        }

        .error-message {
            text-align: center;
            font-size: 13px;
            color: var(--danger);
            margin-bottom: 16px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .error-message.visible {
            display: flex;
        }

        .error-message svg {
            width: 14px;
            height: 14px;
        }

        /* Success overlay */
        .success-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: white;
            border-radius: 16px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10;
            animation: fadeIn 0.3s ease;
        }

        .success-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-overlay .check-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #d1fae5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            animation: scaleIn 0.4s ease 0.2s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .success-overlay .check-circle svg {
            width: 32px;
            height: 32px;
            color: var(--success);
        }

        .success-overlay h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 6px;
        }

        .success-overlay p {
            font-size: 14px;
            color: var(--gray-500);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 36px 24px;
            }

            .otp-input {
                width: 44px;
                height: 52px;
                font-size: 20px;
            }

            .otp-container {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" style="position: relative;">
            <!-- Success Overlay -->
            <div class="success-overlay" id="successOverlay">
                <div class="check-circle">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                </div>
                <h2>Verified!</h2>
                <p>Redirecting to reset password...</p>
            </div>

            <div class="auth-logo">
                <div class="logo-icon">N</div>
                <span>Nexus</span>
            </div>

            <div class="auth-header">
                <div class="icon-circle">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                </div>
                <h1>Enter Verification Code</h1>
                <p>We've sent a 6-digit code to<br><span class="email-sent">j***n@email.com</span></p>
            </div>

            <div class="error-message" id="errorMsg">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Invalid code. Please try again.
            </div>

            <form id="otpForm">
                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" data-index="0" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-input" maxlength="1" data-index="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" data-index="2" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" data-index="3" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" data-index="4" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" data-index="5" inputmode="numeric">
                </div>

                <div class="timer-section">
                    <span class="timer-text">
                        Code expires in <span class="time" id="timer">02:00</span>
                    </span>
                    <button type="button" class="resend-btn" id="resendBtn">Resend Code</button>
                </div>

                <button type="submit" class="btn-primary" id="verifyBtn" disabled>
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Verify Code
                </button>
            </form>

            <div class="auth-footer">
                <a href="forgot-password.html">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Back to Forgot Password
                </a>
            </div>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.otp-input');
        const verifyBtn = document.getElementById('verifyBtn');
        const errorMsg = document.getElementById('errorMsg');
        const timerEl = document.getElementById('timer');
        const resendBtn = document.getElementById('resendBtn');
        let timeLeft = 120;
        let timerInterval;

        // Auto-focus first input
        inputs[0].focus();

        // Handle input
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value.replace(/[^0-9]/g, '');
                e.target.value = value;

                if (value) {
                    e.target.classList.add('filled');
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                } else {
                    e.target.classList.remove('filled');
                }

                checkComplete();
                hideError();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                    inputs[index - 1].value = '';
                    inputs[index - 1].classList.remove('filled');
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
                paste.split('').forEach((char, i) => {
                    if (inputs[i]) {
                        inputs[i].value = char;
                        inputs[i].classList.add('filled');
                    }
                });
                if (paste.length > 0) {
                    inputs[Math.min(paste.length, 5)].focus();
                }
                checkComplete();
            });
        });

        function checkComplete() {
            const code = Array.from(inputs).map(i => i.value).join('');
            verifyBtn.disabled = code.length !== 6;
        }

        function hideError() {
            errorMsg.classList.remove('visible');
        }
