<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shop Electronics, Fashion, Home &amp; more at ShopKart. Best prices, fast delivery, easy returns." />
  <title>Products – ShopKart</title>
  
  <link rel="icon" type="image/png" href="icons/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  
  <style>
    :root {
      --primary: #2874f0; --primary-dark: #1a5ecb; --primary-light: #e8f0fe;
      --secondary: #ff6f00; --accent: #fb641b; --success: #26a541; --danger: #ff4444;
      --dark: #212121; --gray: #757575; --gray-light: #9e9e9e; --gray-lighter: #e0e0e0;
      --bg: #f1f3f6; --white: #ffffff; --card-shadow: 0 2px 16px rgba(0,0,0,0.1);
      --radius: 8px; --transition: all 0.25s ease; --font: "Inter", sans-serif;
    }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: var(--font); background: var(--bg); color: var(--dark); line-height:1.5; }
    a { text-decoration:none; color:inherit; }
    
    .container { max-width: 1280px; margin: 0 auto; padding: 0 16px; }
    
    /* Navbar (same as index) */
    #navbar { background: var(--primary); height: 56px; position: sticky; top:0; z-index:1000; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
    .navbar-inner { display:flex; align-items:center; height:100%; gap:16px; }
    .navbar-logo { display:flex; align-items:flex-end; gap:2px; flex-shrink:0; }
    .logo-text { font-size:22px; font-weight:800; color:#fff; letter-spacing:-0.5px; }
    .logo-text span { color:#ffc107; }
    
    .navbar-search { flex:1; max-width:580px; }
    .search-wrapper { display:flex; align-items:center; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    #search-input { flex:1; padding:10px 16px; font-size:14px; border:none; }
    #search-btn { background:var(--primary); color:#fff; padding:10px 18px; border:none; cursor:pointer; }
    
    .navbar-actions { display:flex; align-items:center; gap:4px; }
    .nav-btn { display:flex; flex-direction:column; align-items:center; padding:6px 12px; color:#fff; font-size:12px; gap:2px; cursor:pointer; }
    .nav-badge { position:absolute; top:2px; right:8px; background:#fb641b; color:#fff; width:18px; height:18px; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; border-radius:50%; border:2px solid #2874f0; }
    
    /* Page Header */
    .page-header { background:#fff; padding:16px 0; border-bottom:1px solid var(--gray-lighter); }
    .breadcrumb { font-size:13px; color:var(--gray); margin-bottom:8px; }
    .breadcrumb a { color:var(--primary); }
    .page-title { font-size:24px; font-weight:700; }
    .results-count { font-size:14px; color:var(--gray); margin-top:4px; }
    
    /* Main Layout */
    .products-layout { display:flex; gap:24px; padding:24px 0; }
    
    /* Filters Sidebar */
    .filters-sidebar {
      width: 260px; flex-shrink:0; background:#fff; border-radius:12px;
      box-shadow: var(--card-shadow); padding:20px; height:fit-content; position:sticky; top:70px;
    }
    .filter-section { margin-bottom:24px; }
    .filter-title { font-size:14px; font-weight:700; margin-bottom:12px; color:var(--dark); }
    .filter-option { display:flex; align-items:center; gap:10px; margin-bottom:8px; cursor:pointer; }
    .filter-option input { accent-color:var(--primary); }
    .filter-option label { font-size:13px; color:var(--dark); cursor:pointer; flex:1; }
    .price-range { display:flex; gap:8px; align-items:center; }
    .price-range input { width:100%; padding:8px; border:1px solid var(--gray-lighter); border-radius:6px; font-size:13px; }
    
    .rating-filter .star { color:#ffc107; }
    
    /* Products Grid */
    .products-main { flex:1; }
    
    .sort-bar {
      background:#fff; padding:14px 20px; border-radius:12px; box-shadow:var(--card-shadow);
      display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
    }
    .sort-options { display:flex; gap:8px; }
    .sort-btn {
      padding:6px 16px; border:1px solid var(--gray-lighter); border-radius:20px;
      font-size:13px; cursor:pointer; transition:var(--transition);
    }
    .sort-btn.active, .sort-btn:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
    
    .product-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:16px;
    }
    
    .product-card {
      background:#fff; border-radius:12px; overflow:hidden; box-shadow:var(--card-shadow);
      transition:var(--transition); position:relative; cursor:pointer;
    }
    .product-card:hover { transform:translateY(-4px); box-shadow:0 8px 32px rgba(0,0,0,0.18); }
    
    .product-img-wrap { position:relative; height:200px; background:#f9f9f9; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .product-img { font-size:90px; transition:transform 0.3s ease; }
    .product-card:hover .product-img { transform:scale(1.08); }
    
    .product-badge { position:absolute; top:12px; left:12px; background:var(--danger); color:#fff; font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; }
    .wishlist-btn { position:absolute; top:12px; right:12px; width:32px; height:32px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,0.15); font-size:14px; color:var(--gray-light); transition:var(--transition); }
    .wishlist-btn:hover, .wishlist-btn.active { color:var(--danger); }
    
    .product-info { padding:14px 16px 18px; }
    .product-name { font-size:14px; font-weight:600; line-height:1.4; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    
    .rating-row { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
    .rating-pill { background:#26a541; color:#fff; font-size:12px; font-weight:600; padding:2px 8px; border-radius:12px; display:flex; align-items:center; gap:3px; }
    .rating-count { font-size:12px; color:var(--gray-light); }
    
    .price-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .current-price { font-size:18px; font-weight:700; }
    .original-price { font-size:13px; color:var(--gray-light); text-decoration:line-through; }
    .discount { font-size:12px; color:#26a541; font-weight:600; }
    
    .add-to-cart {
      width:100%; margin-top:12px; padding:10px; background:var(--primary); color:#fff;
      border:none; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; transition:var(--transition);
    }
    .add-to-cart:hover { background:var(--primary-dark); }
    
    /* Pagination */
    .pagination { display:flex; justify-content:center; gap:8px; margin-top:30px; }
    .page-btn { padding:8px 16px; border:1px solid var(--gray-lighter); border-radius:6px; cursor:pointer; font-size:14px; }
    .page-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    
    /* Toast */
    #toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:10px; }
    .toast { min-width:260px; background:#212121; color:#fff; padding:14px 20px; border-radius:8px; font-size:14px; display:flex; align-items:center; gap:10px; box-shadow:var(--card-shadow); animation:slideIn 0.3s ease; }
    .toast.success { border-left:4px solid #26a541; }
    
    @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
    
    /* Responsive */
    @media (max-width: 1024px) {
      .filters-sidebar { display:none; }
    }
  </style>
</head>
<body>

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Navbar -->
  <nav id="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="navbar-logo">
        <div><div class="logo-text">Shop<span>Kart</span></div></div>
      </a>
      
      <div class="navbar-search">
        <div class="search-wrapper">
          <input type="text" id="search-input" placeholder="Search products..." />
          <button id="search-btn"><i class="fa-solid fa-search"></i></button>
        </div>
      </div>
      
      <div class="navbar-actions">
        <a href="wishlist.html" class="nav-btn"><i class="fa-regular fa-heart"></i><span>Wishlist</span><span class="nav-badge" id="wishlist-count">0</span></a>
        <a href="cart.html" class="nav-btn"><i class="fa-solid fa-cart-shopping"></i><span>Cart</span><span class="nav-badge" id="cart-count">0</span></a>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div class="container">
      <div class="breadcrumb">
        <a href="index.html">Home</a> &gt; 
        <span id="breadcrumb-category">All Products</span>
      </div>
      <div class="page-title">All Products</div>
      <div class="results-count" id="results-count">Showing 120 products</div>
    </div>
  </div>

  <div class="container">
    <div class="products-layout">
      
      <!-- Filters Sidebar -->
      <div class="filters-sidebar">
        <div class="filter-section">
          <div class="filter-title">Categories</div>
          <div class="filter-option"><input type="checkbox" id="cat-mobiles" value="mobiles"><label for="cat-mobiles">Mobiles</label></div>
          <div class="filter-option"><input type="checkbox" id="cat-laptops" value="laptops"><label for="cat-laptops">Laptops</label></div>
          <div class="filter-option"><input type="checkbox" id="cat-electronics" value="electronics"><label for="cat-electronics">Electronics</label></div>
          <div class="filter-option"><input type="checkbox" id="cat-fashion" value="fashion"><label for="cat-fashion">Fashion</label></div>
          <div class="filter-option"><input type="checkbox" id="cat-home" value="home"><label for="cat-home">Home &amp; Living</label></div>
        </div>
        
        <div class="filter-section">
          <div class="filter-title">Price Range</div>
          <div class="price-range">
            <input type="number" id="price-min" placeholder="Min" value="0">
            <span>–</span>
            <input type="number" id="price-max" placeholder="Max" value="200000">
          </div>
        </div>
        
        <div class="filter-section">
          <div class="filter-title">Rating</div>
          <div class="rating-filter">
            <div class="filter-option"><input type="checkbox" value="4"><label>4★ &amp; above <span class="star">★★★★</span></label></div>
            <div class="filter-option"><input type="checkbox" value="3"><label>3★ &amp; above <span class="star">★★★</span></label></div>
          </div>
        </div>
        
        <div class="filter-section">
          <div class="filter-title">Brands</div>
          <div class="filter-option"><input type="checkbox" value="samsung"><label>Samsung</label></div>
          <div class="filter-option"><input type="checkbox" value="apple"><label>Apple</label></div>
          <div class="filter-option"><input type="checkbox" value="sony"><label>Sony</label></div>
          <div class="filter-option"><input type="checkbox" value="nike"><label>Nike</label></div>
        </div>
        
        <button onclick="applyFilters()" style="width:100%; padding:10px; background:#2874f0; color:#fff; border:none; border-radius:8px; font-weight:600;">Apply Filters</button>
      </div>
      
      <!-- Products Main -->
      <div class="products-main">
        
        <!-- Sort Bar -->
        <div class="sort-bar">
          <div><strong id="sort-info">120 Products</strong></div>
          <div class="sort-options">
            <button class="sort-btn active" onclick="sortProducts('relevance')">Relevance</button>
            <button class="sort-btn" onclick="sortProducts('price-low')">Price: Low to High</button>
            <button class="sort-btn" onclick="sortProducts('price-high')">Price: High to Low</button>
            <button class="sort-btn" onclick="sortProducts('rating')">Rating</button>
          </div>
        </div>
        
        <!-- Product Grid -->
        <div class="product-grid" id="product-grid">
          <!-- Populated by JavaScript -->
        </div>
        
        <!-- Pagination -->
        <div class="pagination" id="pagination">
          <!-- Populated by JS -->
        </div>
        
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer style="background:#172337; color:#fff; padding:30px 0; margin-top:40px;">
    <div class="container" style="text-align:center; font-size:13px; opacity:0.8;">
      © 2025 ShopKart. All Rights Reserved.
    </div>
  </footer>

  <script>
    // ==================== MOCK PRODUCT DATA ====================
    let products = [
      { id:1, name:"Samsung Galaxy S24 Ultra 5G 256GB", price:79999, original:134999, discount:65, rating:4.5, reviews:2400, category:"mobiles", brand:"samsung", emoji:"📱" },
      { id:2, name:"Apple MacBook Air M2 8GB 256GB", price:89990, original:119900, discount:55, rating:4.7, reviews:8200, category:"laptops", brand:"apple", emoji:"💻" },
      { id:3, name:"Sony WH-1000XM5 Wireless Headphones", price:19990, original:34990, discount:40, rating:4.6, reviews:5100, category:"electronics", brand:"sony", emoji:"🎧" },
      { id:4, name:"LG 55 inch OLED 4K Smart TV", price:59990, original:114990, discount:72, rating:4.4, reviews:1800, category:"electronics", brand:"lg", emoji:"📺" },
      { id:5, name:"Apple Watch Series 9 GPS 45mm", price:29900, original:45900, discount:50, rating:4.8, reviews:3700, category:"electronics", brand:"apple", emoji:"⌚" },
      { id:6, name:"Nike Air Force 1 White Sneakers", price:5295, original:7995, discount:34, rating:4.3, reviews:6500, category:"fashion", brand:"nike", emoji:"👟" },
      { id:7, name:"Sony PlayStation 5 Digital Edition", price:34990, original:49990, discount:60, rating:4.9, reviews:12000, category:"electronics", brand:"sony", emoji:"🎮" },
      { id:8, name:"iPhone 15 Pro Max 256GB", price:134900, original:149900, discount:10, rating:4.8, reviews:9800, category:"mobiles", brand:"apple", emoji:"📱" },
      { id:9, name:"Dell XPS 15 Laptop", price:129990, original:159990, discount:19, rating:4.5, reviews:2100, category:"laptops", brand:"dell", emoji:"💻" },
      { id:10, name:"Samsung 65 inch QLED 4K TV", price:79990, original:129990, discount:38, rating:4.6, reviews:3200, category:"electronics", brand:"samsung", emoji:"📺" }
    ];
    
    let filteredProducts = [...products];
    let currentPage = 1;
    const perPage = 12;
    
    // ==================== UTILITIES ====================
    function showToast(msg, type = "success") {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fa-solid fa-check-circle"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    function updateBadges() {
      const cart = JSON.parse(localStorage.getItem("sk_cart") || "[]");
      const wish = JSON.parse(localStorage.getItem("sk_wishlist") || "[]");
      document.getElementById("cart-count").textContent = cart.reduce((a,b) => a + (b.qty||1), 0);
      document.getElementById("wishlist-count").textContent = wish.length;
    }
    
    // ==================== RENDER PRODUCTS ====================
    function renderProducts(list) {
      const grid = document.getElementById("product-grid");
      grid.innerHTML = "";
      
      if (list.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px 0; color:#757575;">No products found</div>`;
        return;
      }
      
      const start = (currentPage - 1) * perPage;
      const end = start + perPage;
      const pageItems = list.slice(start, end);
      
      pageItems.forEach(p => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
          <div class="product-img-wrap">
            <div class="product-img">${p.emoji}</div>
            <div class="product-badge">-${p.discount}%</div>
            <button class="wishlist-btn" onclick="event.stopImmediatePropagation(); toggleWishlist(${p.id}, this)">
              <i class="fa-regular fa-heart"></i>
            </button>
          </div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="rating-row">
              <span class="rating-pill">${p.rating} <i class="fa-solid fa-star"></i></span>
              <span class="rating-count">(${p.reviews.toLocaleString()})</span>
            </div>
            <div class="price-row">
              <span class="current-price">₹${p.price.toLocaleString()}</span>
              <span class="original-price">₹${p.original.toLocaleString()}</span>
              <span class="discount">${p.discount}% off</span>
            </div>
            <button class="add-to-cart" onclick="event.stopImmediatePropagation(); addToCart(${p.id})">
              <i class="fa-solid fa-cart-plus"></i> Add to Cart
            </button>
          </div>
        `;
        card.onclick = () => location.href = `product-details.html?id=${p.id}`;
        grid.appendChild(card);
      });
      
      renderPagination(list.length);
    }
    
    function renderPagination(total) {
      const pag = document.getElementById("pagination");
      pag.innerHTML = "";
      const totalPages = Math.ceil(total / perPage);
      if (totalPages <= 1) return;
      
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.className = `page-btn ${i === currentPage ? "active" : ""}`;
        btn.textContent = i;
        btn.onclick = () => { currentPage = i; renderProducts(filteredProducts); };
        pag.appendChild(btn);
      }
    }
    
    // ==================== FILTER & SORT ====================
    function applyFilters() {
      const checkedCats = Array.from(document.querySelectorAll('.filters-sidebar input[type="checkbox"]:checked')).map(el => el.value);
      const minPrice = parseInt(document.getElementById("price-min").value) || 0;
      const maxPrice = parseInt(document.getElementById("price-max").value) || 999999;
      const minRating = Array.from(document.querySelectorAll('.rating-filter input:checked')).map(el => parseFloat(el.value));
      
      filteredProducts = products.filter(p => {
        let match = true;
        if (checkedCats.length && !checkedCats.includes(p.category)) match = false;
        if (p.price < minPrice || p.price > maxPrice) match = false;
        if (minRating.length && !minRating.some(r => p.rating >= r)) match = false;
        return match;
      });
      
      currentPage = 1;
      renderProducts(filteredProducts);
      document.getElementById("results-count").textContent = `Showing ${filteredProducts.length} products`;
    }
    
    function sortProducts(type) {
      document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
      event.currentTarget.classList.add("active");
      
      if (type === "price-low") filteredProducts.sort((a,b) => a.price - b.price);
      if (type === "price-high") filteredProducts.sort((a,b) => b.price - a.price);
      if (type === "rating") filteredProducts.sort((a,b) => b.rating - a.rating);
      if (type === "relevance") filteredProducts = [...products];
      
      currentPage = 1;
      renderProducts(filteredProducts);
    }
    
    // ==================== CART & WISHLIST ====================
    function addToCart(id) {
      const product = products.find(p => p.id === id);
      let cart = JSON.parse(localStorage.getItem("sk_cart") || "[]");
      const existing = cart.findIndex(item => item.id === id);
      
      if (existing > -1) cart[existing].qty = (cart[existing].qty || 1) + 1;
      else cart.push({ ...product, qty: 1 });
      
      localStorage.setItem("sk_cart", JSON.stringify(cart));
      updateBadges();
      showToast("Added to cart!");
    }
    
    function toggleWishlist(id, btn) {
      event.stopImmediatePropagation();
      let wish = JSON.parse(localStorage.getItem("sk_wishlist") || "[]");
      const icon = btn.querySelector("i");
      
      if (wish.includes(id)) {
        wish = wish.filter(x => x !== id);
        icon.classList.replace("fa-solid", "fa-regular");
        btn.classList.remove("active");
      } else {
        wish.push(id);
        icon.classList.replace("fa-regular", "fa-solid");
        btn.classList.add("active");
      }
      
      localStorage.setItem("sk_wishlist", JSON.stringify(wish));
      updateBadges();
      showToast(wish.includes(id) ? "Added to wishlist!" : "Removed from wishlist");
    }
    
    // ==================== INITIALIZE ====================
    function initProducts() {
      // Read URL params
      const params = new URLSearchParams(window.location.search);
      const cat = params.get("cat");
      const q = params.get("q");
      
      let initialList = [...products];
      
      if (cat) {
        initialList = products.filter(p => p.category === cat || p.category.includes(cat));
        document.getElementById("breadcrumb-category").textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
      }
      
      if (q) {
        const query = q.toLowerCase();
        initialList = initialList.filter(p => 
          p.name.toLowerCase().includes(query) || 
          p.brand.toLowerCase().includes(query) ||
          p.category.toLowerCase().includes(query)
        );
        document.getElementById("search-input").value = q;
      }
      
      filteredProducts = initialList;
      document.getElementById("results-count").textContent = `Showing ${filteredProducts.length} products`;
      
      renderProducts(filteredProducts);
      updateBadges();
      
      // Search functionality
      document.getElementById("search-btn").onclick = () => {
        const val = document.getElementById("search-input").value.trim().toLowerCase();
        if (!val) { filteredProducts = [...products]; renderProducts(filteredProducts); return; }
        filteredProducts = products.filter(p => p.name.toLowerCase().includes(val));
        currentPage = 1;
        renderProducts(filteredProducts);
      };
      
      // Enter key search
      document.getElementById("search-input").addEventListener("keydown", e => {
        if (e.key === "Enter") document.getElementById("search-btn").click();
      });
    }
    
    // Auto init
    window.onload = initProducts;
  </script>
</body>
</html>
